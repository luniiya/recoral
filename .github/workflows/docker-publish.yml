name: Publish Docker images

# Builds and pushes the pre-built images that docker-compose.yml (as
# downloaded by an end user, see README) actually pulls, so nobody has to
# build from source themselves. See RELEASE.md for the full walkthrough,
# including the one-time step of making the GHCR packages public after the
# very first run of this workflow.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Runners start from a clean VM every time, no local Docker cache to
      # reuse like a real dev machine has, so without this every release
      # would redo the same apt/bun installs from scratch. GitHub's own
      # Actions cache backend persists layers between workflow runs instead.
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server
          tags: |
            ghcr.io/${{ github.repository_owner }}/recoral:latest
            ghcr.io/${{ github.repository_owner }}/recoral:${{ github.event.release.tag_name || 'dev' }}

  # CPU build, the default everyone gets (see docker-compose.yml and
  # RELEASE.md for the opt-in ROCm variant).
  transcription-cpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Cached: the slow part here is compiling whisper.cpp from source
      # (apt deps + git clone + cmake build), not something to redo from
      # scratch on every release if nothing upstream actually changed.
      - uses: docker/build-push-action@v6
        with:
          context: ./transcription
          file: ./transcription/Dockerfile
          push: true
          cache-from: type=gha,scope=transcription-cpu
          cache-to: type=gha,mode=max,scope=transcription-cpu
          tags: |
            ghcr.io/${{ github.repository_owner }}/recoral-transcription:latest
            ghcr.io/${{ github.repository_owner }}/recoral-transcription:${{ github.event.release.tag_name || 'dev' }}

  # Opt-in GPU variant, not pulled by default. Slow (compiles whisper.cpp
  # from source against the ROCm toolchain) and unverified by CI beyond "it
  # builds" (no GPU runner available here to actually exercise it).
  transcription-rocm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./transcription
          file: ./transcription/Dockerfile.rocm
          push: true
          cache-from: type=gha,scope=transcription-rocm
          cache-to: type=gha,mode=max,scope=transcription-rocm
          tags: |
            ghcr.io/${{ github.repository_owner }}/recoral-transcription:latest-rocm
            ghcr.io/${{ github.repository_owner }}/recoral-transcription:${{ github.event.release.tag_name || 'dev' }}-rocm
