name: recoral

services:
  recoral:
    build: .
    ports:
      - "7245:7245"
    environment:
      - PORT=7245
      - DATA_DIR=/data
      - TRANSCRIPTION_URL=http://transcription:8090
    volumes:
      - recoral-data:/data
    restart: unless-stopped
    depends_on:
      - transcription

  # ASR (whisper.cpp), kept as its own service rather than folded into the
  # main container: a completely different runtime profile (heavy build
  # deps, long-running whisper-cli invocations) from the lean Bun+SQLite
  # server above. Gated by the transcriptionEnabled admin setting; the main
  # server just calls this over the compose network.
  #
  # CPU by default (no GPU device passthrough at all): the real first
  # deployment target for this project has no GPU, and hardware backend has
  # to be picked before startup, not toggled from within the app, since it
  # means a genuinely different container image (a different compiled
  # binary), not a runtime setting.
  #
  # Have a compatible AMD GPU (ROCm, gfx1100/gfx1101 tested)? Uncomment the
  # `build`/`image` override below and the `extends` block, matching Immich's
  # own hwaccel.ml.yml pattern:
  #
  #   build:
  #     context: ./transcription
  #     dockerfile: Dockerfile.rocm
  #   extends:
  #     file: hwaccel.transcription.yml
  #     service: rocm
  #
  # (if pulling published images instead of building locally, use the
  # `-rocm` tag suffix instead of the build override, e.g.
  # ghcr.io/luniiya/recoral-transcription:latest-rocm)
  transcription:
    build: ./transcription
    environment:
      - PORT=8090
      - MODELS_DIR=/models
    volumes:
      - recoral-transcription-models:/models
    restart: unless-stopped

volumes:
  recoral-data:
  recoral-transcription-models:
