// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.7.2'
        classpath 'com.google.gms:google-services:4.4.2'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// Pin every android/android-library subproject (including the ones pulled in
// from node_modules, e.g. @capacitor/android) to the build-tools version
// actually installed on this machine, instead of letting AGP auto-fetch its
// own preferred version (which needs an SDK license acceptance we can't do
// here, this machine's Android SDK dir is root-owned with no sudo access).
subprojects {
    afterEvaluate { project ->
        if (project.hasProperty('android')) {
            project.android.buildToolsVersion "37.0.0"
        }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
