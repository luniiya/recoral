# The file an end user actually downloads and runs (see README's Quick
# Start), pulling pre-built images from GHCR instead of building from
# source. The repo's own docker-compose.yml still builds locally with
# `build: .`, useful for development or a from-source deploy; this is the
# "just run it" version, generated by hand to stay in sync, not templated.
name: recoral

services:
  recoral:
    image: ghcr.io/luniiya/recoral:${RECORAL_VERSION:-latest}
    ports:
      - "${RECORAL_PORT:-7245}:7245"
    environment:
      - PORT=7245
      - DATA_DIR=/data
      - TRANSCRIPTION_URL=http://transcription:8090
    volumes:
      - recoral-data:/data
    restart: unless-stopped
    depends_on:
      - transcription

  # ASR (whisper.cpp). CPU by default, no GPU device passthrough. Have a
  # compatible AMD GPU (ROCm, gfx1100/gfx1101 tested)? Change the image tag
  # below to `latest-rocm` and uncomment the extends block, matching
  # Immich's own hwaccel.ml.yml pattern. Hardware backend has to be picked
  # before startup (it's a different built image), not toggled at runtime.
  transcription:
    image: ghcr.io/luniiya/recoral-transcription:${RECORAL_VERSION:-latest}
    # extends:
    #   file: hwaccel.transcription.yml
    #   service: rocm
    environment:
      - PORT=8090
      - MODELS_DIR=/models
    volumes:
      - recoral-transcription-models:/models
    restart: unless-stopped

volumes:
  recoral-data:
  recoral-transcription-models:
